<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動起來！！！</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #000; [cite: 2]
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 700px; [cite: 3]
      margin: 0 auto; [cite: 4]
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative; /* 讓圖片可以相對此容器浮動 */
    }

    .group {
      background-color: #111; [cite: 4]
      border-radius: 10px; [cite: 5]
      padding: 16px;
      border: 1px solid #333;
    }

    /* 浮動圖片樣式 */
    #floatImg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 80vw;
      max-height: 50vh;
      z-index: 9999;
      display: none; /* 平時隱藏 */
      pointer-events: none; /* 防止遮擋點擊 */
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
    }

    .btn-row {
      display: flex; [cite: 5]
      flex-wrap: wrap; [cite: 6]
      gap: 12px;
      justify-content: center;
    }

    .btn-toggle {
      padding: 12px 20px; [cite: 6]
      font-size: 18px; [cite: 7]
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }

    #btnMove { background: #3b82f6; } [cite: 8]
    #btnDodge { background: #10b981; } [cite: 9]

    .btn-toggle.active { filter: brightness(1.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); } [cite: 10]
    .btn-toggle.inactive { filter: brightness(0.7); opacity: 0.5; } [cite: 11]

    select, input {
      font-size: 16px; [cite: 16]
      padding: 6px 10px; [cite: 17]
      background-color: #222; [cite: 17]
      color: #fff;
      border: 1px solid #555; [cite: 18]
      border-radius: 6px;
    }

    #btnStart { background: #f97316; padding: 10px 30px; border-radius: 6px; border: none; color: #fff; cursor: pointer; } [cite: 27, 28]
    #btnStop { background: #ef4444; padding: 10px 30px; border-radius: 6px; border: none; color: #fff; cursor: pointer; } [cite: 29]
    button:disabled { opacity: 0.6; cursor: not-allowed; } [cite: 30]

    .status { text-align: center; font-size: 14px; color: #888; margin: 12px 0; } [cite: 31]
  </style>
</head>
<body>
  <img id="floatImg" src="" alt="Action">

  <div class="container">
    <div class="group">
      <div class="btn-row">
        <button id="btnMove" class="btn-toggle inactive" type="button">移動</button>
        <button id="btnDodge" class="btn-toggle inactive" type="button">閃躲</button>
      </div>
      <div class="btn-row" style="margin-top: 12px; gap: 20px;">
        <div>等級：<select id="levelMove"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
        <div>等級：<select id="levelDodge"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
      </div>
    </div>

    <div class="group">
      <div class="btn-row" style="align-items: center;">
        <label>基準秒數：</label>
        <input type="number" id="fixedSec" min="0.3" max="5" step="0.1" value="3" />
      </div>
      <div class="btn-row" style="margin-top: 12px; align-items: center;">
        <label><input type="checkbox" id="randomCheck" /> 隨機</label>
        <div id="randomRange" style="display: none; align-items: center; margin-left: 10px;">
          <span>起：</span>
          <input type="number" id="minSec" min="0.3" max="5" step="0.1" placeholder="0.5" />
        </div>
      </div>
      <div class="status" style="font-size: 12px;">提示：隨機起點未填則預設為 0.5 秒</div>
    </div>

    <div class="group">
      <div class="btn-row">
        停止條件：
        <input type="number" id="stopCount" placeholder="次" style="width: 60px;"/> 次 或 
        <input type="number" id="stopMin" placeholder="分" style="width: 60px;"/> 分
      </div>
    </div>

    <div class="group">
      <div class="btn-row">
        <button id="btnStart" type="button">開始</button>
        <button id="btnStop" type="button" disabled>停止</button>
      </div>
      <div id="statusText" class="status">待機中</div>
    </div>
  </div>

  <script>
    // 資料結構：將音效與圖片(png)綁定
    const resources = {
      move: {
        1: [
          { s: "sounds/move1.mp3", i: "image/move1.png" },
          { s: "sounds/move2.mp3", i: "image/move2.png" },
          { s: "sounds/move3.mp3", i: "image/move3.png" },
          { s: "sounds/move4.mp3", i: "image/move4.png" }
        ],
        2: [
          { s: "move1.mp3", i: "move1.png" },
          { s: "move2.mp3", i: "move2.png" }
        ],
        3: [
          { s: "move1.mp3", i: "move1.png" },
          { s: "move2.mp3", i: "move2.png" },
          { s: "move3.mp3", i: "move3.png" }
        ]
      },
      dodge: {
        1: [{ s: "dodge1.mp3", i: "dodge1.png" }],
        2: [
          { s: "dodge1.mp3", i: "dodge1.png" },
          { s: "dodge2.mp3", i: "dodge2.png" }
        ],
        3: [
          { s: "dodge1.mp3", i: "dodge1.png" },
          { s: "dodge2.mp3", i: "dodge2.png" },
          { s: "dodge3.mp3", i: "dodge3.png" }
        ]
      }
    };

    let timerId = null;
    let playedCount = 0;
    let startTime = null;
    let isActive = { move: false, dodge: false };

    const floatImg = document.getElementById("floatImg");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const statusText = document.getElementById("statusText");

    // 取得下次隨機時間
    function getNextInterval() {
      let max = parseFloat(document.getElementById("fixedSec").value) || 3;
      if (!document.getElementById("randomCheck").checked) return max * 1000;

      let min = parseFloat(document.getElementById("minSec").value);
      if (isNaN(min)) min = 0.5; // 隨機未填預設 0.5 
      
      if (min > max) min = max;
      return (Math.random() * (max - min) + min) * 1000; [cite: 58]
    }

    // 核心播放邏輯
    function playCycle() {
      const choices = [];
      if (isActive.move) choices.push(...resources.move[document.getElementById("levelMove").value]);
      if (isActive.dodge) choices.push(...resources.dodge[document.getElementById("levelDodge").value]);

      if (choices.length === 0) {
        stopAction();
        alert("請先開啟移動或閃躲");
        return;
      }

      // 隨機選一個
      const item = choices[Math.floor(Math.random() * choices.length)]; [cite: 51]
      
      // 1. 播放音效
      const audio = new Audio(item.s); [cite: 52]
      audio.play().catch(() => {});

      // 2. 顯示浮動圖片
      floatImg.src = item.i;
      floatImg.style.display = "block";
      
      // 圖片顯示 0.5 秒後自動消失，避免一直擋著介面
      setTimeout(() => { floatImg.style.display = "none"; }, 800);

      playedCount++;
      updateStatusDisplay();

      // 檢查停止條件 [cite: 69, 71]
      const targetCount = parseInt(document.getElementById("stopCount").value);
      const targetMin = parseFloat(document.getElementById("stopMin").value);
      
      if (targetCount > 0 && playedCount >= targetCount) { stopAction(); return; }
      if (targetMin > 0 && (Date.now() - startTime) / 60000 >= targetMin) { stopAction(); return; }

      // 每一次結束後，重新計算下一次的隨機時間並設定 Timeout
      timerId = setTimeout(playCycle, getNextInterval());
    }

    function updateStatusDisplay() {
      const diff = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(diff / 60); [cite: 63]
      const s = diff % 60;
      statusText.textContent = `執行中：已播 ${playedCount} 次 (${m}分${s}秒)`; [cite: 61, 64]
    }

    btnStart.onclick = function() {
      if (!isActive.move && !isActive.dodge) return alert("請先開啟移動或閃躲"); [cite: 67]
      playedCount = 0;
      startTime = Date.now(); [cite: 68]
      btnStart.disabled = true;
      btnStop.disabled = false;
      playCycle();
    };

    function stopAction() {
      clearTimeout(timerId);
      timerId = null; [cite: 74]
      btnStart.disabled = false;
      btnStop.disabled = true;
      statusText.textContent = "已停止";
      floatImg.style.display = "none";
    }

    btnStop.onclick = stopAction; [cite: 73]

    // 按鈕開關與介面連動
    document.getElementById("btnMove").onclick = function() {
      isActive.move = !isActive.move;
      this.className = `btn-toggle ${isActive.move ? 'active' : 'inactive'}`; [cite: 47]
    };
    document.getElementById("btnDodge").onclick = function() {
      isActive.dodge = !isActive.dodge;
      this.className = `btn-toggle ${isActive.dodge ? 'active' : 'inactive'}`; [cite: 48]
    };
    document.getElementById("randomCheck").onchange = function() {
      document.getElementById("randomRange").style.display = this.checked ? "flex" : "none"; [cite: 77, 78]
    };
  </script>
</body>
</html>
