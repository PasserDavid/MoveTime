<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動起來！！！</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group {
      background-color: #111;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #333;
    }

    /* 圖片顯示區塊 */
    .image-display-area {
      width: 100%;
      height: 250px;
      background-color: #222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 8px;
    }

    #displayImg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none; /* 初始隱藏 */
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn-toggle {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      transition: all 0.2s;
    }

    #btnMove { background: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    #btnDodge { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

    .btn-toggle.active { filter: brightness(1.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
    .btn-toggle.inactive { filter: brightness(0.6); opacity: 0.5; }

    .level-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; }
    .level-group { display: flex; align-items: center; gap: 6px; }

    select, input {
      font-size: 16px;
      padding: 6px 10px;
      background-color: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
    }

    input[type="number"] { width: 70px; }
    .hint { font-size: 12px; color: #888; text-align: center; margin-top: 6px; }

    .random-row, .stop-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }

    #btnStart { background: #f97316; }
    #btnStop { background: #ef4444; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status { text-align: center; font-size: 14px; color: #888; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="group">
      <div class="image-display-area">
        <img id="displayImg" src="" alt="動作提示">
        <div id="placeholderText" style="color:#555;">等待開始...</div>
      </div>
    </div>

    <div class="group">
      <div class="btn-row">
        <button id="btnMove" class="btn-toggle inactive" type="button">移動</button>
        <button id="btnDodge" class="btn-toggle inactive" type="button">閃躲</button>
      </div>
      <div class="level-row">
        <div class="level-group">
          <label>移動等級：</label>
          <select id="levelMove">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="level-group">
          <label>閃躲等級：</label>
          <select id="levelDodge">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="btn-row" style="align-items: center;">
        <label for="fixedSec">秒數：</label>
        <input type="number" id="fixedSec" min="0.3" max="5" step="0.1" value="3" />
        <span>秒</span>
      </div>
      <div class="random-row">
        <label><input type="checkbox" id="randomCheck" /> 隨機</label>
        <div id="randomRange" style="display: none; align-items: center; gap: 5px;">
          <span>起：</span>
          <input type="number" id="minSec" min="0.3" max="5" step="0.1" placeholder="0.5" />
        </div>
      </div>
      <div class="hint">請輸入 0.3～5 秒（隨機未填預設 0.5）</div>
    </div>

    <div class="group">
      <div class="stop-row">
        <label>停止：</label>
        <input type="number" id="stopCount" placeholder="次數" /> <span>次</span>
        <input type="number" id="stopMin" placeholder="分鐘" /> <span>分</span>
      </div>
    </div>

    <div class="group">
      <div class="btn-row">
        <button id="btnStart" type="button" style="padding:10px 30px; border-radius:8px; border:none; color:white;">開始</button>
        <button id="btnStop" type="button" disabled style="padding:10px 30px; border-radius:8px; border:none; color:white;">停止</button>
      </div>
      <div class="status" id="statusText">待機中</div>
    </div>
  </div>

  <script>
    const sounds = {
      move: {
        1: ["sounds/move1.mp3","sounds/move2.mp3","sounds/move3.mp3","sounds/move4.mp3"],
        2: ["move1.mp3", "move2.mp3"],
        3: ["move1.mp3", "move2.mp3", "move3.mp3"],
      },
      dodge: {
        1: ["dodge1.mp3"],
        2: ["dodge1.mp3", "dodge2.mp3"],
        3: ["dodge1.mp3", "dodge2.mp3", "dodge3.mp3"],
      },
    };

    // 圖片對應 (請確保檔案存在)
    const images = {
      move: "move.jpg",
      dodge: "dodge.jpg"
    };

    let timerId = null;
    let playedCount = 0;
    let startTime = null;
    let isActive = { move: false, dodge: false };

    const btnMove = document.getElementById("btnMove");
    const btnDodge = document.getElementById("btnDodge");
    const displayImg = document.getElementById("displayImg");
    const placeholderText = document.getElementById("placeholderText");
    const statusText = document.getElementById("statusText");

    function updateBtnState() {
      btnMove.className = `btn-toggle ${isActive.move ? 'active' : 'inactive'}`;
      btnDodge.className = `btn-toggle ${isActive.dodge ? 'active' : 'inactive'}`;
    }

    function playAction() {
      const choices = [];
      if (isActive.move) choices.push({ type: 'move', list: sounds.move[document.getElementById("levelMove").value] });
      if (isActive.dodge) choices.push({ type: 'dodge', list: sounds.dodge[document.getElementById("levelDodge").value] });
      
      if (choices.length === 0) return;

      const action = choices[Math.floor(Math.random() * choices.length)];
      const soundFile = action.list[Math.floor(Math.random() * action.list.length)];
      
      // 顯示圖片 
      displayImg.src = images[action.type];
      displayImg.style.display = "block";
      placeholderText.style.display = "none";

      // 播放音效 
      const audio = new Audio(soundFile);
      audio.play().catch(() => {});
      
      playedCount++;
      updateStatus();
      
      // 檢查停止條件 [cite: 69, 70, 71]
      const maxCount = parseInt(document.getElementById("stopCount").value);
      const maxMin = parseFloat(document.getElementById("stopMin").value);
      
      if (maxCount > 0 && playedCount >= maxCount) {
        stopTraining();
        return;
      }
      if (maxMin > 0 && (Date.now() - startTime) / 60000 >= maxMin) {
        stopTraining();
        return;
      }

      // 核心修改：每一聲後重新計算下一次的隨機秒數 
      timerId = setTimeout(playAction, getNextInterval());
    }

    function getNextInterval() {
      let max = parseFloat(document.getElementById("fixedSec").value) || 3;
      let min = 0.5; // 預設 0.5 [cite: 53]

      if (document.getElementById("randomCheck").checked) {
        const inputMin = parseFloat(document.getElementById("minSec").value);
        if (!isNaN(inputMin)) min = inputMin; // 若有輸入則覆蓋 [cite: 54, 55]
      } else {
        return max * 1000; // 非隨機模式
      }

      if (min > max) min = max;
      return (Math.random() * (max - min) + min) * 1000; [cite: 58]
    }

    function updateStatus() {
      if (!startTime) { statusText.textContent = "待機中"; return; }
      const diff = Math.floor((Date.now() - startTime) / 1000);
      statusText.textContent = `播放中，已播 ${playedCount} 次（約 ${Math.floor(diff/60)}分 ${diff%60}秒）`; [cite: 61, 63]
    }

    document.getElementById("btnStart").onclick = function() {
      if (!isActive.move && !isActive.dodge) { alert("請先開啟移動或閃躲"); return; }
      playedCount = 0;
      startTime = Date.now();
      this.disabled = true;
      document.getElementById("btnStop").disabled = false;
      playAction();
    };

    function stopTraining() {
      clearTimeout(timerId);
      timerId = null;
      document.getElementById("btnStart").disabled = false;
      document.getElementById("btnStop").disabled = true;
      displayImg.style.display = "none";
      placeholderText.style.display = "block";
      placeholderText.textContent = "訓練結束";
    }

    document.getElementById("btnStop").onclick = stopTraining;
    btnMove.onclick = () => { isActive.move = !isActive.move; updateBtnState(); };
    btnDodge.onclick = () => { isActive.dodge = !isActive.dodge; updateBtnState(); };
    document.getElementById("randomCheck").onchange = function() {
      document.getElementById("randomRange").style.display = this.checked ? "flex" : "none";
    };

    updateBtnState();
  </script>
</body>
</html>
