<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動起來！！！</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    /* 浮動圖片：出現在畫面中央 */
    #actionImg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      max-width: 80%;
      max-height: 60vh;
      display: none;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
    }

    .group {
      background-color: #111;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #333;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn-toggle {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      position: relative;
    }

    #btnMove { background: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    #btnDodge { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

    .btn-toggle.active { filter: brightness(1.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
    .btn-toggle.inactive { filter: brightness(0.7); box-shadow: 0 0 5px rgba(255, 255, 255, 0.1); }
    .btn-toggle:active { transform: scale(0.98); }

    .level-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; }
    .level-group { display: flex; align-items: center; gap: 6px; }
    label { font-size: 14px; white-space: nowrap; }
    select, input { font-size: 16px; padding: 6px 10px; background-color: #222; color: #fff; border: 1px solid #555; border-radius: 6px; }
    input[type="number"] { width: 90px; }
    .hint { font-size: 12px; color: #888; text-align: center; margin-top: 6px; }

    .random-row, .stop-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; }
    .random-row input[type="number"], .stop-row input[type="number"] { width: 60px; }

    #btnStart { background: #f97316; box-shadow: 0 0 8px rgba(249, 115, 16, 0.4); }
    #btnStop { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
    #btnStart:disabled, #btnStop:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { text-align: center; font-size: 14px; color: #888; margin: 12px 0; }

    @media (min-width: 768px) {
      .btn-row, .level-row, .random-row, .stop-row { flex-direction: row; }
    }
  </style>
</head>
<body>
  <img id="actionImg" src="" alt="Action Image">

  <div class="container">
    <div class="group">
      <div class="btn-row">
        <button id="btnMove" class="btn-toggle inactive" type="button">移動</button>
        <button id="btnDodge" class="btn-toggle inactive" type="button">閃躲</button>
      </div>
      <div class="level-row">
        <div class="level-group">
          <label for="levelMove">移動等級：</label>
          <select id="levelMove">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="level-group">
          <label for="levelDodge">閃躲等級：</label>
          <select id="levelDodge">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="input-row" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center;">
        <label for="fixedSec">秒數：</label>
        <input type="number" id="fixedSec" min="0.3" max="5" step="0.1" value="3" />
        <span class="unit">秒</span>
      </div>
      <div class="hint">請輸入 0.3～5 秒</div>
      <div class="random-row">
        <label><input type="checkbox" id="randomCheck" /> <span>隨機</span></label>
        <div id="randomRange" style="display: none; gap: 4px; align-items: center;">
          <input type="number" id="minSec" min="0.3" max="5" step="0.1" placeholder="0.5" />
          <span>起</span>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="stop-row">
        <label for="stopCount">停止條件：</label>
        <input type="number" id="stopCount" placeholder="次" /> <span>次</span>
        <span>或</span>
        <input type="number" id="stopMin" placeholder="分" /> <span>分</span>
      </div>
      <div class="hint">若皆不填，則一直執行</div>
    </div>

    <div class="group">
      <div class="btn-row">
        <button id="btnStart" type="button" style="padding: 8px 24px; border: none; border-radius: 6px; color: #fff; cursor: pointer;">開始</button>
        <button id="btnStop" type="button" disabled style="padding: 8px 24px; border: none; border-radius: 6px; color: #fff; cursor: pointer;">停止</button>
      </div>
      <div class="status" id="statusText">待機中</div>
    </div>
  </div>

  <script>
    // 資料結構：音效與圖片綁定，路徑均在 image/ 下
    const sounds = {
      move: {
        1: [
          { a: "image/move1.mp3", i: "image/move1.png" },
          { a: "image/move2.mp3", i: "image/move2.png" },
          { a: "image/move3.mp3", i: "image/move3.png" },
          { a: "image/move4.mp3", i: "image/move4.png" }
        ],
        2: [
          { a: "image/move1.mp3", i: "image/move1.png" },
          { a: "image/move2.mp3", i: "image/move2.png" }
        ],
        3: [
          { a: "image/move1.mp3", i: "image/move1.png" },
          { a: "image/move2.mp3", i: "image/move2.png" },
          { a: "image/move3.mp3", i: "image/move3.png" }
        ],
      },
      dodge: {
        1: [{ a: "image/dodge1.mp3", i: "image/dodge1.png" }],
        2: [
          { a: "image/dodge1.mp3", i: "image/dodge1.png" },
          { a: "image/dodge2.mp3", i: "image/dodge2.png" }
        ],
        3: [
          { a: "image/dodge1.mp3", i: "image/dodge1.png" },
          { a: "image/dodge2.mp3", i: "image/dodge2.png" },
          { a: "image/dodge3.mp3", i: "image/dodge3.png" }
        ],
      },
    };

    const btnMove = document.getElementById("btnMove");
    const btnDodge = document.getElementById("btnDodge");
    const actionImg = document.getElementById("actionImg");
    const statusText = document.getElementById("statusText");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");

    let timerId = null;
    let playedCount = 0;
    let startTime = null;
    let isActive = { move: false, dodge: false };

    function updateBtnState() {
      btnMove.className = `btn-toggle ${isActive.move ? 'active' : 'inactive'}`;
      btnDodge.className = `btn-toggle ${isActive.dodge ? 'active' : 'inactive'}`;
    }

    function playRandomSound() {
      const choices = [];
      if (isActive.move) choices.push(...sounds.move[document.getElementById("levelMove").value]);
      if (isActive.dodge) choices.push(...sounds.dodge[document.getElementById("levelDodge").value]);
      
      if (choices.length === 0) return;

      const selected = choices[Math.floor(Math.random() * choices.length)];
      
      // 更新圖片並顯示
      actionImg.src = selected.i;
      actionImg.style.display = "block";

      // 播放音效
      const audio = new Audio(selected.a);
      audio.play().catch(() => {});
      
      playedCount++;
      updateStatus();
    }

    function getNextInterval() {
      let max = parseFloat(document.getElementById("fixedSec").value) || 3;
      if (!document.getElementById("randomCheck").checked) return max * 1000;

      let min = parseFloat(document.getElementById("minSec").value);
      if (isNaN(min)) min = 0.5; // 隨機未填預設 0.5 秒
      
      if (min > max) min = max;
      return (Math.random() * (max - min) + min) * 1000;
    }

    function updateStatus() {
      if (!startTime) { statusText.textContent = "待機中"; return; }
      const diff = Math.floor((Date.now() - startTime) / 1000);
      statusText.textContent = `播放中，已播 ${playedCount} 次（約 ${Math.floor(diff/60)} 分 ${diff%60} 秒）`;
    }

    function trainingLoop() {
      // 檢查停止條件
      const cntVal = parseInt(document.getElementById("stopCount").value);
      const minVal2 = parseFloat(document.getElementById("stopMin").value);

      if (!isNaN(cntVal) && cntVal > 0 && playedCount >= cntVal) { stopTraining(); return; }
      if (!isNaN(minVal2) && minVal2 > 0 && (Date.now() - startTime) / 60000 >= minVal2) { stopTraining(); return; }

      playRandomSound();
      
      // 遞迴呼叫：每一次執行後重新計算下次隨機時間
      timerId = setTimeout(trainingLoop, getNextInterval());
    }

    btnStart.onclick = function () {
      if (timerId) return;
      if (!isActive.move && !isActive.dodge) return alert("請至少開啟一項動作");
      
      playedCount = 0;
      startTime = Date.now();
      btnStart.disabled = true;
      btnStop.disabled = false;
      trainingLoop();
    };

    function stopTraining() {
      clearTimeout(timerId);
      timerId = null;
      btnStart.disabled = false;
      btnStop.disabled = true;
      statusText.textContent = "訓練結束";
      actionImg.style.display = "none"; // 停止時隱藏圖片
    }

    btnStop.onclick = stopTraining;
    btnMove.onclick = () => { isActive.move = !isActive.move; updateBtnState(); };
    btnDodge.onclick = () => { isActive.dodge = !isActive.dodge; updateBtnState(); };
    document.getElementById("randomCheck").onchange = function() {
      document.getElementById("randomRange").style.display = this.checked ? "flex" : "none";
    };

    updateBtnState();
  </script>
</body>
</html>
