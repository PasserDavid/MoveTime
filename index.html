<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動起來！！！</title>
  <style>
    /* 保留你原始的所有樣式 [cite: 1, 2, 3] */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; position: relative; }
    
    /* 浮動圖片：固定在螢幕中心 [cite: 1, 4] */
    #actionImg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      max-width: 80%;
      max-height: 70vh;
      display: none;
      pointer-events: none;
    }

    .group { background-color: #111; border-radius: 10px; padding: 16px; border: 1px solid #333; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    
    /* 恢復點按與發光效果 [cite: 1, 10, 11, 12] */
    .btn-toggle { padding: 12px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; color: #fff; transition: transform 0.1s; }
    #btnMove { background: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    #btnDodge { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    .btn-toggle.active { filter: brightness(1.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
    .btn-toggle.inactive { filter: brightness(0.7); opacity: 0.5; }
    .btn-toggle:active { transform: scale(0.95); }

    .level-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 12px; }
    select, input { font-size: 16px; padding: 6px 10px; background-color: #222; color: #fff; border: 1px solid #555; border-radius: 6px; }
    #btnStart { background: #f97316; padding: 10px 30px; border-radius: 8px; border: none; color: white; cursor: pointer; }
    #btnStop { background: #ef4444; padding: 10px 30px; border-radius: 8px; border: none; color: white; cursor: pointer; }
    .status { text-align: center; font-size: 14px; color: #888; margin: 12px 0; }
  </style>
</head>
<body>
  <img id="actionImg" src="" alt="Action">

  <div class="container">
    <div class="group">
      <div class="btn-row">
        <button id="btnMove" class="btn-toggle inactive" type="button">移動</button>
        <button id="btnDodge" class="btn-toggle inactive" type="button">閃躲</button>
      </div>
      <div class="level-row">
        <div>移動等級：<select id="levelMove"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
        <div>閃躲等級：<select id="levelDodge"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
      </div>
    </div>

    <div class="group">
      <div class="btn-row">
        <label>秒數：</label>
        <input type="number" id="fixedSec" min="0.3" max="5" step="0.1" value="3" />
        <label style="margin-left:10px;"><input type="checkbox" id="randomCheck" /> 隨機</label>
        <div id="randomRange" style="display: none; align-items: center; gap: 4px;">
          <input type="number" id="minSec" min="0.3" max="5" step="0.1" placeholder="0.5" /> 起
        </div>
      </div>
    </div>

    <div class="group">
      <div class="btn-row">
        <button id="btnStart" type="button">開始</button>
        <button id="btnStop" type="button" disabled>停止</button>
      </div>
      <div class="status" id="statusText">正在預載資源...</div>
    </div>
  </div>

  <script>
    // 定義等級資源 [cite: 1, 41]
    const resources = {
      move: {
        1: [1,2,3,4].map(n => ({ a: `sounds/move${n}.mp3`, i: `image/move${n}.png` })),
        2: [5,6].map(n => ({ a: `sounds/move${n}.mp3`, i: `image/move${n}.png` })),
        3: [7,8,9].map(n => ({ a: `sounds/move${n}.mp3`, i: `image/move${n}.png` }))
      },
      dodge: {
        1: [1,2,3,4].map(n => ({ a: `sounds/dodge${n}.mp3`, i: `image/dodge${n}.png` })),
        2: [5,6].map(n => ({ a: `sounds/dodge${n}.mp3`, i: `image/dodge${n}.png` })),
        3: [7,8,9].map(n => ({ a: `sounds/dodge${n}.mp3`, i: `image/dodge${n}.png` }))
      }
    };

    // 建立快取空間
    const audioCache = {};
    const imageCache = {};
    let isReady = false;

    // 執行預載入
    function preloadAll() {
      const allTasks = [];
      Object.values(resources).forEach(category => {
        Object.values(category).forEach(items => {
          items.forEach(item => {
            // 預載音效
            if (!audioCache[item.a]) {
              const audio = new Audio();
              audio.src = item.a;
              audio.load();
              audioCache[item.a] = audio;
            }
            // 預載圖片
            if (!imageCache[item.i]) {
              const img = new Image();
              img.src = item.i;
              imageCache[item.i] = img;
            }
          });
        });
      });
      isReady = true;
      document.getElementById("statusText").textContent = "資源預載完成，準備就緒";
    }

    let timerId = null;
    let playedCount = 0;
    let startTime = null;
    let isActive = { move: false, dodge: false };

    const actionImg = document.getElementById("actionImg");
    const statusText = document.getElementById("statusText");

    function playCycle() {
      if (!isReady) return;

      const choices = [];
      if (isActive.move) choices.push(...resources.move[document.getElementById("levelMove").value]);
      if (isActive.dodge) choices.push(...resources.dodge[document.getElementById("levelDodge").value]);
      
      if (choices.length === 0) return stopTraining();

      const item = choices[Math.floor(Math.random() * choices.length)];
      
      // 從快取拿資源 
      const cachedAudio = audioCache[item.a];
      const cachedImg = imageCache[item.i];

      // 同步顯示與播放
      cachedAudio.currentTime = 0; // 重置音效進度
      cachedAudio.play().then(() => {
          actionImg.src = cachedImg.src;
          actionImg.style.display = "block";
      }).catch(() => {
          actionImg.style.display = "block"; // 即使音效被攔截也顯示圖片
      });

      playedCount++;
      updateStatus();

      // 計算下次間隔 [cite: 1, 58]
      let max = parseFloat(document.getElementById("fixedSec").value) || 3;
      let min = parseFloat(document.getElementById("minSec").value) || 0.5;
      if (!document.getElementById("randomCheck").checked) min = max;
      
      const nextTime = (Math.random() * (max - Math.min(min, max)) + Math.min(min, max)) * 1000;
      timerId = setTimeout(playCycle, nextTime);
    }

    function updateStatus() {
      const diff = Math.floor((Date.now() - startTime) / 1000);
      statusText.textContent = `執行中：已播 ${playedCount} 次 (${Math.floor(diff/60)}分${diff%60}秒)`;
    }

    document.getElementById("btnStart").onclick = function() {
      if (!isActive.move && !isActive.dodge) return alert("請先開啟動作");
      playedCount = 0;
      startTime = Date.now();
      this.disabled = true;
      document.getElementById("btnStop").disabled = false;
      playCycle();
    };

    function stopTraining() {
      clearTimeout(timerId);
      timerId = null;
      document.getElementById("btnStart").disabled = false;
      document.getElementById("btnStop").disabled = true;
      statusText.textContent = "待機中";
      actionImg.style.display = "none";
    }

    document.getElementById("btnStop").onclick = stopTraining;
    document.getElementById("btnMove").onclick = function() { isActive.move = !isActive.move; this.className = `btn-toggle ${isActive.move ? 'active' : 'inactive'}`; };
    document.getElementById("btnDodge").onclick = function() { isActive.dodge = !isActive.dodge; this.className = `btn-toggle ${isActive.dodge ? 'active' : 'inactive'}`; };
    document.getElementById("randomCheck").onchange = function() { document.getElementById("randomRange").style.display = this.checked ? "flex" : "none"; };

    // 頁面載入後立即執行預載入
    window.onload = preloadAll;
  </script>
</body>
</html>
